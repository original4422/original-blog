<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Independent Vercel and GitHub Pages release flow</title>
  <desc id="desc">A merge to main triggers independent Vercel and GitHub Pages deployments. Both expose version JSON and should converge to the same commit within fifteen minutes.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7f3f5"/><stop offset="1" stop-color="#eadfe6"/></linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#171317"/><stop offset="1" stop-color="#3a1830"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#de1d8d"/></marker>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#background)"/>
  <text x="64" y="72" fill="#8f155d" font-family="Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="5">ONE MERGE · TWO DEPLOYMENTS</text>
  <text x="64" y="122" fill="#171317" font-family="Georgia, serif" font-size="42" font-weight="700">Simultaneous intent, observable convergence</text>

  <rect x="64" y="238" width="196" height="148" rx="22" fill="url(#ink)"/>
  <text x="90" y="278" fill="#ff7fc4" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">PRODUCTION INTENT</text>
  <text x="90" y="326" fill="#fff" font-family="Georgia, serif" font-size="34" font-weight="700">main</text>
  <text x="90" y="356" fill="#cfc5cb" font-family="Arial, sans-serif" font-size="15">commit abc1234</text>

  <path d="M260 276 C324 276 324 224 382 224" fill="none" stroke="#de1d8d" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M260 348 C324 348 324 442 382 442" fill="none" stroke="#de1d8d" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="396" y="160" width="270" height="160" rx="22" fill="#fff" stroke="#cdbfc7" stroke-width="2"/>
  <circle cx="428" cy="194" r="9" fill="#31a36b"/>
  <text x="450" y="201" fill="#37604c" font-family="Arial, sans-serif" font-size="14" font-weight="700">INDEPENDENT LANE A</text>
  <text x="424" y="245" fill="#171317" font-family="Georgia, serif" font-size="29" font-weight="700">Vercel deploy</text>
  <text x="424" y="282" fill="#655c62" font-family="Arial, sans-serif" font-size="16">build · publish · CDN</text>

  <rect x="396" y="378" width="270" height="160" rx="22" fill="#fff" stroke="#cdbfc7" stroke-width="2"/>
  <circle cx="428" cy="412" r="9" fill="#31a36b"/>
  <text x="450" y="419" fill="#37604c" font-family="Arial, sans-serif" font-size="14" font-weight="700">INDEPENDENT LANE B</text>
  <text x="424" y="463" fill="#171317" font-family="Georgia, serif" font-size="29" font-weight="700">Pages deploy</text>
  <text x="424" y="500" fill="#655c62" font-family="Arial, sans-serif" font-size="16">export · audit · artifact</text>

  <path d="M666 240h78" fill="none" stroke="#de1d8d" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M666 458h78" fill="none" stroke="#de1d8d" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="760" y="174" width="232" height="132" rx="20" fill="#171317"/>
  <text x="784" y="214" fill="#ff7fc4" font-family="Arial, sans-serif" font-size="13" font-weight="700">/version.json</text>
  <text x="784" y="252" fill="#fff" font-family="Arial, sans-serif" font-size="19" font-weight="700">commit: abc1234</text>
  <text x="784" y="280" fill="#cfc5cb" font-family="Arial, sans-serif" font-size="14">app: vercel</text>

  <rect x="760" y="392" width="232" height="132" rx="20" fill="#171317"/>
  <text x="784" y="432" fill="#ff7fc4" font-family="Arial, sans-serif" font-size="13" font-weight="700">/version.json</text>
  <text x="784" y="470" fill="#fff" font-family="Arial, sans-serif" font-size="19" font-weight="700">commit: abc1234</text>
  <text x="784" y="498" fill="#cfc5cb" font-family="Arial, sans-serif" font-size="14">app: pages</text>

  <path d="M992 240h60M992 458h60" fill="none" stroke="#de1d8d" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="1066" y="214" width="86" height="270" rx="43" fill="#de1d8d"/>
  <text x="1109" y="286" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="700">SAME</text>
  <text x="1109" y="311" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="700">SHA</text>
  <path d="M1109 337v44" stroke="#fff" stroke-width="3"/>
  <circle cx="1109" cy="396" r="18" fill="#fff"/>
  <path d="m1100 396 7 7 13-16" fill="none" stroke="#de1d8d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1109" y="445" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="700">≤ 15 MIN</text>

  <text x="64" y="586" fill="#655c62" font-family="Arial, sans-serif" font-size="16">A short version gap is deployment state—not content loss.</text>
</svg>
