<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">One canonical content source feeding two independent blog applications</title>
  <desc id="desc">The packages content workspace feeds a Vercel application and a GitHub Pages application, which deploy independently to a primary site and a warm standby site.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#080708"/>
      <stop offset="1" stop-color="#24101c"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#ff70bd"/>
      <stop offset="1" stop-color="#de1d8d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10z" fill="#de1d8d"/>
    </marker>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#background)"/>
  <circle cx="1050" cy="72" r="210" fill="#de1d8d" opacity=".11"/>
  <circle cx="90" cy="620" r="240" fill="#de1d8d" opacity=".07"/>

  <text x="64" y="72" fill="#de1d8d" font-family="Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="5">ONE SOURCE · TWO APPLICATIONS</text>
  <text x="64" y="122" fill="#fff" font-family="Georgia, serif" font-size="42" font-weight="700">A personal blog that can fail over</text>

  <rect x="64" y="198" width="310" height="244" rx="24" fill="#161316" stroke="#71405c" stroke-width="2"/>
  <rect x="88" y="222" width="118" height="28" rx="14" fill="url(#pink)"/>
  <text x="108" y="242" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="700">CANONICAL</text>
  <text x="88" y="300" fill="#fff" font-family="Georgia, serif" font-size="31" font-weight="700">packages/content</text>
  <text x="88" y="342" fill="#bcb4ba" font-family="Arial, sans-serif" font-size="17">MDX posts · projects · identity</text>
  <text x="88" y="374" fill="#bcb4ba" font-family="Arial, sans-serif" font-size="17">schema · media · public copy</text>
  <path d="M90 406h252" stroke="#5e4a56" stroke-dasharray="5 7"/>
  <text x="88" y="428" fill="#ff8ac8" font-family="Arial, sans-serif" font-size="14" font-weight="700">THE ONLY EDITABLE CONTENT SOURCE</text>

  <path d="M374 274 C432 274 440 234 486 234" fill="none" stroke="#de1d8d" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M374 362 C432 362 440 402 486 402" fill="none" stroke="#de1d8d" stroke-width="4" marker-end="url(#arrow)"/>
  <circle cx="424" cy="274" r="6" fill="#ff70bd" filter="url(#glow)"/>
  <circle cx="424" cy="362" r="6" fill="#ff70bd" filter="url(#glow)"/>

  <rect x="498" y="174" width="268" height="160" rx="22" fill="#111011" stroke="#4f454b" stroke-width="2"/>
  <text x="526" y="216" fill="#de1d8d" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">APP / VERCEL</text>
  <text x="526" y="259" fill="#fff" font-family="Georgia, serif" font-size="29" font-weight="700">Runtime-rich</text>
  <text x="526" y="295" fill="#bcb4ba" font-family="Arial, sans-serif" font-size="16">Route handlers · image optimization</text>

  <rect x="498" y="354" width="268" height="160" rx="22" fill="#111011" stroke="#4f454b" stroke-width="2"/>
  <text x="526" y="396" fill="#de1d8d" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">APP / PAGES</text>
  <text x="526" y="439" fill="#fff" font-family="Georgia, serif" font-size="29" font-weight="700">Static export</text>
  <text x="526" y="475" fill="#bcb4ba" font-family="Arial, sans-serif" font-size="16">basePath · generated static assets</text>

  <path d="M766 254h84" fill="none" stroke="#de1d8d" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M766 434h84" fill="none" stroke="#de1d8d" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="866" y="174" width="270" height="160" rx="22" fill="#fff"/>
  <text x="894" y="216" fill="#8f155d" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">PRIMARY</text>
  <text x="894" y="255" fill="#171317" font-family="Georgia, serif" font-size="27" font-weight="700">Vercel</text>
  <text x="894" y="286" fill="#171317" font-family="Georgia, serif" font-size="27" font-weight="700">Production</text>
  <text x="894" y="315" fill="#655c62" font-family="Arial, sans-serif" font-size="15">independent deployment</text>

  <rect x="866" y="354" width="270" height="160" rx="22" fill="#fff"/>
  <text x="894" y="396" fill="#8f155d" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">WARM STANDBY</text>
  <text x="894" y="439" fill="#171317" font-family="Georgia, serif" font-size="28" font-weight="700">GitHub Pages</text>
  <text x="894" y="476" fill="#655c62" font-family="Arial, sans-serif" font-size="16">same intent, static artifact</text>

  <rect x="64" y="556" width="1072" height="2" fill="#44333d"/>
  <text x="64" y="594" fill="#bcb4ba" font-family="Arial, sans-serif" font-size="16">Shared semantics. Separate implementations. Observable releases.</text>
  <text x="1136" y="594" text-anchor="end" fill="#de1d8d" font-family="Arial, sans-serif" font-size="16" font-weight="700">RPO 0 · RTO ≤ 1h</text>
</svg>
